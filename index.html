<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tuesday Talk</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      text-align: center;
      padding: 3rem 2rem 1rem;
    }

    header h1 {
      font-size: 3rem;
      color: #f0c040;
      letter-spacing: 0.05em;
    }

    header p {
      margin-top: 0.75rem;
      font-size: 1.2rem;
      color: #a0a8c0;
      font-style: italic;
    }

    main {
      max-width: 720px;
      width: 90%;
      margin: 3rem auto;
      background: #16213e;
      border-radius: 8px;
      padding: 2.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    main h2 {
      font-size: 1.5rem;
      color: #f0c040;
      margin-bottom: 1rem;
    }

    main p {
      line-height: 1.8;
      margin-bottom: 1rem;
      color: #c8cfe0;
    }

    .cta {
      text-align: center;
      margin-top: 2rem;
    }

    .cta a {
      display: inline-block;
      background: #f0c040;
      color: #1a1a2e;
      font-family: Georgia, serif;
      font-size: 1.1rem;
      font-weight: bold;
      padding: 0.85rem 2.5rem;
      border-radius: 4px;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: background 0.2s;
    }

    .cta a:hover {
      background: #ffd966;
    }

    footer {
      text-align: center;
      padding: 2rem;
      font-size: 0.85rem;
      color: #505870;
    }
  </style>
</head>
<body>

  <header>
    <h1>Tuesday Talk</h1>
    <p>Ideas worth sharing, one Tuesday at a time.</p>
  </header>

  <main>
    <h2>Welcome</h2>
    <p>
      This is the home of Tuesday Talk — a space for conversations, reflections,
      and ideas explored week by week.
    </p>
    <p>
      Content is coming soon. Check back on a Tuesday!
    </p>
    <div class="cta">
      <a href="claude-talk.html">Are you ready?</a>
    </div>
  </main>

  <footer>
    &copy; 2026 Tuesday Talk &mdash; tuesdaytalk.github.io
  </footer>

</body>
</html>
